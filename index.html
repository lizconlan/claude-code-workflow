<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Tic-Tac-Toe</h1>
      <!-- Scoreboard: cumulative wins per player for the session -->
      <div class="scoreboard" aria-label="Scoreboard">
        <div class="score">
          <span class="score-label">Player X</span>
          <span class="score-value" id="score-x">0</span>
        </div>
        <div class="score-divider" aria-hidden="true">vs</div>
        <div class="score">
          <span class="score-label">Player O</span>
          <span class="score-value" id="score-o">0</span>
        </div>
      </div>
    </header>

    <main>
      <!-- Live region so screen readers announce turn/result changes -->
      <p
        class="status"
        id="status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      >
        Player X's turn
      </p>

      <!-- 3x3 game board; cells are injected by game.js -->
      <div
        class="board"
        id="board"
        role="grid"
        aria-label="Tic-Tac-Toe board"
      ></div>

      <button class="btn-reset" id="btn-reset" type="button">New Game</button>
    </main>

    <script src="game.js"></script>
  </body>
</html>
